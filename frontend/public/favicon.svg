<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Strawberry Pink Gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <!-- Golden Cone Gradient -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Subtle Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#2a1b16" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Right C (Crazy) in Gold -->
    <path d="M 77.5 20 A 30 30 0 0 0 77.5 80" fill="none" stroke="url(#grad2)" stroke-width="18" stroke-linecap="round"/>
    
    <!-- Left C (Cone) in Pink -->
    <path d="M 52.5 20 A 30 30 0 0 0 52.5 80" fill="none" stroke="url(#grad1)" stroke-width="18" stroke-linecap="round"/>
  </g>
</svg>